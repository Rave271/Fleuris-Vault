{% extends "base.html" %}

{% block title %}{{ brand_name }} - Transfer{% endblock %}

{% block content %}
<section class="page-heading">
    <p class="eyebrow">Move money</p>
    <h1>Secure transfer</h1>
    <p class="muted">Transfers are limited, validated, logged, and tied to your own account.</p>
</section>

<form class="form-card wide" method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <label for="to_account">Recipient account</label>
    <select id="to_account" name="to_account" required>
        <option value="">Choose recipient</option>
        {% for recipient in recipients %}
            <option value="{{ recipient["id"] }}">{{ recipient["username"] }} - Account {{ recipient["id"] }}</option>
        {% endfor %}
    </select>

    <label for="amount">Amount</label>
    <input type="number" step="0.01" min="0.01" max="5000" id="amount" name="amount" required>

    <button type="submit">Send transfer</button>

    {% if message %}
        <p class="alert {{ message_type }}">{{ message }}</p>
    {% endif %}
</form>
{% endblock %}
